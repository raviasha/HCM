version: "3.9"

services:
  # ── Provider Backend (GPT-4o orchestration only) ──
  provider:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  # ── Client Container (data stays here) ──
  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "8001:8001"   # Client FastAPI
      - "8501:8501"   # Streamlit dashboard
    environment:
      - PROVIDER_URL=http://provider:8000
      - API_BASE_URL=http://localhost:8001
    volumes:
      - client_data:/app/client/data
    depends_on:
      - provider
    restart: unless-stopped

volumes:
  client_data:
